title: Bloodshed Mod Toolkit
description: >-
  BepInEx mod for Bloodshed (Unity IL2CPP) — God Mode, 4-player Steam P2P co-op,
  difficulty tweaks, AI bots. Windows x64. Press F5 in-game.
# url/baseurl은 빌드 시 CNAME 유무에 따라 자동 결정됩니다.
# CNAME 있음 → https://<domain>, baseurl: ""
# CNAME 없음 → 아래 폴백값 사용 (.github/workflows/pages.yml 참고)
url: "https://myso-kr.github.io"
baseurl: "/bloodshed-mod-toolkit"
lang: en

permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# OG image defaults by domain — 1200x630 JPEG optimised for social sharing
defaults:
  - scope:
      path: ""
    values:
      image: /images/og_banner_hero.jpg
  - scope:
      path: "features"
    values:
      image: /images/og_banner_power.jpg
  - scope:
      path: "overview"
    values:
      image: /images/og_banner_hero.jpg

# Twitter card
twitter:
  card: summary_large_image

# Social / author info (used by jekyll-seo-tag)
social:
  name: myso-kr
  links:
    - https://github.com/myso-kr/bloodshed-mod-toolkit

# Include hidden directories so .well-known is served
include:
  - .well-known

# Exclude non-docs files from Jekyll processing
exclude:
  - Gemfile
  - Gemfile.lock
  - "*.gemspec"
  - vendor
