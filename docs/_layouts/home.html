<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>

  {%- seo -%}
  {%- include custom-head.html -%}

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon"  href="{{ site.baseurl }}/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/images/icon_v1_skull_wrench.png" />
  <link rel="apple-touch-icon"          href="{{ site.baseurl }}/images/icon_v1_skull_wrench.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            game:    ['Saira Condensed', 'sans-serif'],
            display: ['Rajdhani', 'sans-serif'],
            code:    ['JetBrains Mono', 'monospace'],
          },
          colors: {
            blood:  '#dc2626',
            ember:  '#ea580c',
            steam:  '#1b2838',
            bg:     '#0a0a0a',
            surface:'#111827',
            border: '#1f2937',
            muted:  '#6b7280',
            text:   '#e5e7eb',
          },
        },
      },
    }
  </script>

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/game.css" />
</head>

<body class="bg-bg text-text font-display overflow-x-hidden">
  <div class="scanlines" aria-hidden="true"></div>

  <!-- Transparent overlay navbar for home -->
  <header id="home-nav">
    <div class="navbar-inner">
      <div class="navbar-top">
        <a href="{{ site.baseurl }}/" class="site-logo" aria-label="{{ site.title }}">
          <i class="fa-solid fa-skull text-blood mr-2 text-sm"></i>BLOODSHED<span class="text-blood">.</span>MOD
        </a>
        <nav class="lang-switcher" aria-label="Language">
          <a href="{{ site.baseurl }}/features/en/"    class="lang-btn lang-active">EN</a>
          <a href="{{ site.baseurl }}/features/ko/"    class="lang-btn">KO</a>
          <a href="{{ site.baseurl }}/features/ja/"    class="lang-btn">JA</a>
          <a href="{{ site.baseurl }}/features/zh-CN/" class="lang-btn">ZH</a>
        </nav>
      </div>
      <nav class="domain-tabs" aria-label="Sections">
        <a href="{{ site.baseurl }}/overview/en/"      class="nav-tab">Overview</a>
        <a href="{{ site.baseurl }}/features/en/"      class="nav-tab">Features</a>
        <a href="{{ site.baseurl }}/installation/en/"  class="nav-tab">Installation</a>
        <a href="{{ site.baseurl }}/technical/en/"     class="nav-tab">Technical</a>
        <a href="{{ site.baseurl }}/license/en/"       class="nav-tab">License</a>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="text-muted text-sm">
        <i class="fa-brands fa-github mr-1"></i>
        <a href="https://github.com/myso-kr/bloodshed-mod-toolkit" class="footer-link">bloodshed-mod-toolkit</a>
        &mdash; MIT &copy; 2024 myso-kr
      </span>
      <span class="text-muted text-sm">
        <a href="https://store.steampowered.com/app/2747550/Bloodshed/" class="footer-link">
          <i class="fa-brands fa-steam mr-1"></i>Bloodshed on Steam
        </a>
      </span>
    </div>
  </footer>
</body>
</html>
