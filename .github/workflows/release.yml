name: Release

# 로컬에서 Publish-Release.ps1 이 태그를 push 하면 트리거.
# CI 는 컴파일 검증 + GitHub Release 생성을 담당.
# 릴리즈 에셋(EXE, zip, DLL)은 Publish-Release.ps1 이 로컬에서 업로드.
on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_MOD_VERSION: '6.0.x'
  DOTNET_INSTALLER_VERSION: '8.0.x'

jobs:
  # ── 1. 모드 DLL 컴파일 검증 (스텁 모드) ──────────────────────────────────────
  validate-mod:
    name: Validate Mod (Stub Build)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_MOD_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_MOD_VERSION }}

      - name: Download BepInEx 6.x core
        shell: pwsh
        run: |
          $url = "https://builds.bepinex.dev/projects/bepinex_be/754/BepInEx-Unity.IL2CPP-win-x64-6.0.0-be.754%2Bc038613.zip"
          Invoke-WebRequest $url -OutFile bepinex.zip
          Expand-Archive bepinex.zip -DestinationPath bepinex-dl
          $corePath = (Resolve-Path "bepinex-dl\BepInEx").Path
          echo "BEPINEX_PATH=$corePath" >> $env:GITHUB_ENV

      - name: Build mod (stub mode)
        shell: pwsh
        run: |
          dotnet build -c Release `
            "-p:UseStubs=true" `
            "-p:BepInExPath=$env:BEPINEX_PATH" `
            --no-incremental

  # ── 2. 인스톨러 컴파일 검증 ────────────────────────────────────────────────────
  validate-installer:
    name: Validate Installer Build
    runs-on: windows-latest
    # 인스톨러 빌드 시 EmbeddedResource 로 모드 DLL 이 필요.
    # CI 에서는 스텁 빌드 DLL 을 사용해 컴파일만 검증.
    needs: validate-mod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (mod)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_MOD_VERSION }}

      - name: Setup .NET (installer)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_INSTALLER_VERSION }}

      - name: Download BepInEx 6.x core
        shell: pwsh
        run: |
          $url = "https://builds.bepinex.dev/projects/bepinex_be/754/BepInEx-Unity.IL2CPP-win-x64-6.0.0-be.754%2Bc038613.zip"
          Invoke-WebRequest $url -OutFile bepinex.zip
          Expand-Archive bepinex.zip -DestinationPath bepinex-dl
          $corePath = (Resolve-Path "bepinex-dl\BepInEx").Path
          echo "BEPINEX_PATH=$corePath" >> $env:GITHUB_ENV

      - name: Build mod DLL (stub, for installer embed)
        shell: pwsh
        run: |
          dotnet build -c Release `
            "-p:UseStubs=true" `
            "-p:BepInExPath=$env:BEPINEX_PATH" `
            --no-incremental

      - name: Build installer
        shell: pwsh
        run: |
          dotnet build Installer/BloodshedModToolkitInstaller.csproj -c Release

  # ── 3. GitHub Release 생성 (에셋은 로컬 Publish-Release.ps1 이 업로드) ──────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-mod, validate-installer]
    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release (if not exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"

          # 이미 릴리즈가 존재하면 건너뜀 (로컬 스크립트가 먼저 만들었을 수 있음)
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG already exists (created by Publish-Release.ps1). Skipping."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Bloodshed Mod Toolkit v$VERSION" \
              --generate-notes \
              --draft
            echo "Draft release $TAG created. Run Publish-Release.ps1 locally to upload assets."
          fi
