name: Release

# 로컬에서 scripts/Publish-Release.ps1 을 실행하면 태그 push + DLL 업로드까지 자동화됩니다.
# 이 워크플로우는 태그 push 시 릴리즈 zip 패키지를 자동 생성합니다.
# 단, 실제 동작하는 DLL은 로컬에서 업로드되어야 합니다 (스텁 빌드 결과물 사용 불가).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Bloodshed Mod Toolkit v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --draft
          echo "::notice::Draft release created. Upload the DLL with: scripts/Publish-Release.ps1 -Version ${{ steps.version.outputs.version }}"
