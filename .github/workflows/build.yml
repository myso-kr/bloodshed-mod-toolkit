name: Build Check

# push 는 pre-push hook 이 실제 빌드를 보장하므로 제외.
# PR 에서만 실행 — 외부 기여자 코드를 게임 DLL 없이 검증.
on:
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: '6.0.x'

jobs:
  build:
    name: Compile Check (Stubs)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # BepInEx 6.x 코어 DLL 다운로드 (BepInEx.Core, 0Harmony, Il2CppInterop 등)
      # interop/ 폴더는 필요 없음 — 게임 타입은 Stubs/*.cs 로 대체
      - name: Download BepInEx 6.x core
        shell: pwsh
        run: |
          $releases = Invoke-RestMethod "https://api.github.com/repos/BepInEx/BepInEx/releases"
          $release  = $releases | Where-Object { $_.tag_name -like "v6*" } | Select-Object -First 1
          $asset    = $release.assets | Where-Object { $_.name -match "win[._-]x64" } | Select-Object -First 1
          Write-Host "Downloading BepInEx $($release.tag_name): $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile bepinex.zip
          Expand-Archive bepinex.zip -DestinationPath bepinex-dl
          $corePath = (Resolve-Path "bepinex-dl\BepInEx").Path
          echo "BEPINEX_PATH=$corePath" >> $env:GITHUB_ENV
          Write-Host "BepInEx core path: $corePath"

      # UseStubs=true: Stubs/*.cs 로 게임·Unity 타입 대체 (110MB interop 불필요)
      # 이 빌드의 결과물은 런타임 동작을 보장하지 않음 (컴파일 에러 조기 발견 목적)
      - name: Build (stub mode)
        shell: pwsh
        run: |
          dotnet build -c Release `
            "-p:UseStubs=true" `
            "-p:BepInExPath=$env:BEPINEX_PATH" `
            --no-incremental
